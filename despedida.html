<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/boasvindas.css">
    <link rel="icon" type="image/x-icon" href="img/icon.jpeg">
    <title>Obrigada | CredTech</title>
</head>
<body>

    <div class="main-container">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="img/boasvindas.mp4" type="video/mp4">
        </video>

        <div class="content-overlay">
            <h1 class="welcome-title">
                Obrigada pela preferência, <span id="user-name">...</span>. Volte sempre!
            </h1>
        </div>
    </div>

    <script>
        // 1. Define o nome do usuário
        const nome = localStorage.getItem("usuarioLogado") || "Visitante";
        document.getElementById("user-name").innerText = nome;

        // 2. Lógica de Redirecionamento
        setTimeout(function() {
            window.location.href = "index.php";
        }, 5000); 
    </script>

</body>
</html>
