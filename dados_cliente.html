<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dados.css">
    <title>CredTech</title>
</head>
<body>
    <div class="box_img">
        <img src="img/dados.jpg" alt="CredTech">
    </div>
    
    <div class="content">
        <h1>DADOS DO CLIENTE</h1>
   
        <form id="form_cliente">
            <div class="form_row">
                <div class="form_group">
                    <label for="nome">Nome</label><br>
                    <input type="text" id="nome" name="nome" placeholder="Nome completo" required><br>
                    <small id="erro_nome"></small><br><br>
                </div>
                
                <div class="form_group">
                    <label for="cpf">CPF</label><br>
                    <input type="text" id="cpf" name="cpf" placeholder= "000.000.000-00" maxlength="14" required><br>
                    <small id="erro_cpf"></small><br><br>
                </div>
            </div>
            
            <div class="form_row">
                <div class="form_group">
                    <label for="telefone">Celular</label><br>
                    <input type="text" id="telefone" name="telefone" placeholder="(xx) xxxxx-xxxx" maxlength="15" required><br>
                    <small id="erro_telefone"></small><br><br>
                </div>

                <div class="form_group">
                    <label for="email">E-mail</label><br>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required><br>
                    <small id="erro_email"></small><br><br>
                </div>
            </div>
            
            <div class="form_row">
                <div class="form_group">
                    <label for="cep">CEP</label><br>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required><br>
                    <small id="erro_cep"></small><br><br>
                </div>
                <div class="form_group">
                    <label for="endereco">Endereço</label><br>
                    <input type="text" id="endereco" name="endereco" placeholder="Logradouro" required><br>
                    <small id="erro_endereco"></small><br><br>
                </div>

                <div class="form_group">
                    <label for="numero">Número</label><br>
                    <input type="number" id="numero" name="numero" placeholder="Número do imóvel" min="0" required><br>
                    <small id="erro_numero"></small><br><br>
                </div>
            </div>
            
            <div class="form_row">
                <div class="form_group">
                    <label for="cidade">Cidade</label><br>
                    <input type="text" id="cidade" name="cidade" placeholder= "Cidade" required><br>
                    <small id="erro_cidade"></small><br><br>
                </div>

                <div class="form_group">
                    <label for="bairro">Bairro</label><br>
                    <input type="text" id="bairro" name="bairro" placeholder= "Bairro" required><br>
                    <small id="erro_bairro"></small><br><br>
                </div>

                <div class="form_group">
                    <label for="estado">Estado</label><br>
                    <select name="estado" id="estado" required>
                        <option value="">Selecione</option>

                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select><br><br>
                </div>
            </div>
            
            <div class="form_row">
                <div class="form_group">
                    <label>Tipo de conta: </label><br><br>
                    <input type="radio" id="conta_fisica" name="tipo" value="pf" required>Pessoa física<br>
                    <input type="radio" id="conta_juridica" name="tipo" value="pj" required>Pessoa jurídica<br>
                </div>
            </div>
            
            <br><br>

            <button type="button" id="botao_cliente" disabled>Salvar</button>
        
        </form><br><br>
    </div>

    <script src="script.js" defer></script>
   
</body>
</html>
