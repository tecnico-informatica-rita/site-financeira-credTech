<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredTech</title>
</head>
<body>
 
    <h1>DADOS DO CLIENTE</h1>
   
    <form onsubmit="event.preventDefault()">
        <label for="nome">Nome</label><br>
        <input type="text" id="nome" name="nome" placeholder="Nome completo" required><br>
        <small id="erro_nome"></small><br><br>
 
        <label for="cpf">CPF</label><br>
        <input type="text" id="cpf" name="cpf" placeholder= "000.000.000-00" maxlength="14" required><br><br>
        <p id="erro_cpf"></p>
 
        <label for="telefone">Celular</label><br>
        <input type="text" id="telefone" name="telefone" placeholder="(xx) xxxxx-xxxx" maxlength="15" required><br><br>
        <p id="erro_telefone"></p>
 
        <label for="email">E-mail</label><br>
        <input type="email" id="email" name="email" placeholder="exemplo@email.com" required><br><br>
        <p id="erro_email"></p>
 
        <label for="cep">CEP</label><br>
        <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required><br><br>
        <p id="erro_cep"></p>
 
        <label for="endereco">Endereço</label><br>
        <input type="text" id="endereco" name="endereco" placeholder="Logradouro" required><br><br>
        <p id="erro_endereco"></p>
 
        <label for="numero">Número</label><br>
        <input type="number" id="numero" name="numero" placeholder="Número do imóvel" min="0" required><br><br>
        <p id="erro_numero"></p>
 
        <label for="cidade">Cidade</label><br>
        <input type="text" id="cidade" name="cidade" placeholder= "Cidade" required><br><br>
        <p id="erro_cidade"></p>
 
        <label for="bairro">Bairro</label><br>
        <input type="text" id="bairro" name="bairro" placeholder= "Bairro" required><br><br>
        <p id="erro_bairro"></p>
 
        <label for="estado">Estado</label><br>
        <select name="estado" id="estado" required>
            <option value="">Selecione</option>

            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
        </select><br><br>

        <label>Tipo de conta: </label><br><br>
        <input type="radio" id="conta_fisica" name="tipo" value="pf" required>Pessoa física<br>
        <input type="radio" id="conta_juridica" name="tipo" value="pj" required>Pessoa jurídica
    <br>

    <h1>CONFIGURAÇÕES DO EMPRÉSTIMO</h1>
 
        <label for="renda">Renda Mensal Bruta (R$):</label><br>
        <input type="number" id="renda" step="0.01" name="renda" placeholder="0000.00" min="0" required><br><br>
        <p id="erro_renda"></p>

        <label for="valor_pretendido">Valor pretendido (R$):</label><br>
        <input type="number" id="valor_pretendido" step="0.01" name="valor_pretendido" placeholder="0000.00" min="0" required><br><br>
        <p id="erro_valor_pretendido"></p>
 
        <label for="parcelas">Quantidade de parcelas:</label>
        <small>(Mínimo 12x e máximo 48x)</small><br>
        <select id="parcelas" name="parcelas" required>
            <option value="">Selecione</option>
        </select>
        
    
    <button type="submit">Simular Empréstimo</button>
    </form><br><br>

    <script src="script.js" defer></script>
   
</body>
</html>
